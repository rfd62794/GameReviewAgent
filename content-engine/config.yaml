assembly:
  asset_fallback_ai: true
  image_cycling_enabled: true
  image_cycling_interval_s: 12
  image_cycling_mode: ken_burns
  image_variant_count: 2
  ken_burns_intensity: slow
  output_resolution_midform: 1920x1080
  output_resolution_short: 1080x1920
  reference_images_enabled: true
  subtitle_mode: srt
  subtitles_enabled: true
  transition_style: hard
  youtube_candidates: 5
  youtube_clip_buffer_s: 2
  youtube_clip_enabled: true
  
  # Image Cycling & Grounding
  youtube_confidence_threshold: 0.8
llm:
  routing_mode: openrouter
ytdlp_extra_flags:
- --remote-components
- ejs:github

pypongai_capture:
  enabled: true
  game_path: ../PyPongAI
  output_dir: assets/clips
  
  # Screen capture
  ffmpeg:
    method: gdigrab
    width: 800
    height: 600
    fps: 30
    bitrate: 5000k
  
  # Game automation
  ui_coordinates:
    menu_title: [400, 100]
    play_button: [200, 300]
    train_button: [600, 300]
    start_button: [400, 500]
    back_button: [50, 50]
  
  # Recording behavior
  match_duration_target: 30
  startup_wait: 3
  match_complete_timeout: 120
  auto_index_clips: true
  clip_metadata_format: json
